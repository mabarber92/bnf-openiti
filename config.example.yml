# BNF–OpenITI Pipeline Configuration
# ------------------------------------
# Copy this file to config.yml and fill in your local paths.
# config.yml is gitignored — never commit it (may contain absolute paths).

# ---------------------------------------------------------------------------
# Data sources
# ---------------------------------------------------------------------------

# Absolute path to your local BNF OAI-PMH XML directory
bnf_data_path:

# Absolute path to your local OpenITI data directory
openiti_data_path:

# ---------------------------------------------------------------------------
# Pipeline outputs
# ---------------------------------------------------------------------------

# Root directory for all pipeline artifacts.
# Relative paths are resolved from the project root.
# Use an absolute path outside the repo to keep large files off disk entirely.
pipeline_out_dir: outputs

# BNF survey output directory (summary, ngrams, boilerplate, review CSV).
# Defaults to <pipeline_out_dir>/bnf_survey if not set.
# bnf_survey_dir:

# ---------------------------------------------------------------------------
# Survey settings
# ---------------------------------------------------------------------------

survey:
  # Largest n-gram size to compute (2 = bigrams only, 4 = bigrams–quadgrams)
  max_n: 4
  # Retain trailing dots on abbreviation tokens (e.g. "cf.", "ms.")
  # so abbreviation phrases form distinct n-grams
  keep_abbrev_dots: true

# ---------------------------------------------------------------------------
# Boilerplate detection — per-field configuration
# (used by `survey build` to generate the review CSV)
# ---------------------------------------------------------------------------
#
# Only fields listed here are scanned for n-grams.
# Delete any field you do not want scanned; add any DC field that exists
# in your collection (e.g. contributor, type, publisher).
#
# mode: "full"      — apply both doc_freq_pct AND max_repeats_per_doc.
#                     Use for mixed-content fields (dc:description) where
#                     boilerplate and real content coexist.
# mode: "freq_only" — apply only doc_freq_pct.
#                     Use for fields that are predominantly boilerplate
#                     (role labels, physical descriptions, rights notices).
#
# min_doc_freq_pct:    minimum % of records an n-gram must appear in
# max_repeats_per_doc: max avg occurrences per record (full mode only)
#                      ~1.0 = structural template; higher = content/names
#
# Both Latin-script and Arabic-script n-grams are detected independently
# for every field listed — Arabic boilerplate is surfaced if it clears
# the threshold, even if the field is primarily Latin-script.

boilerplate:
  fields:
    # dc:description — mixed content; boilerplate and real text coexist.
    # Lower threshold to surface rarer structural phrases.
    description:
      mode: full
      min_doc_freq_pct: 2.0
      max_repeats_per_doc: 1.1

    # dc:creator — role labels ("Auteur du texte", "Copiste") appear on
    # almost every record. Keep threshold low enough to catch rarer roles.
    creator:
      mode: freq_only
      min_doc_freq_pct: 10.0

    # dc:subject — controlled-vocabulary terms repeated across many records.
    subject:
      mode: freq_only
      min_doc_freq_pct: 15.0

    # --- Optional fields — uncomment to scan ---

    # dc:contributor — role labels ("Ancien possesseur") on contributor names.
    # contributor:
    #   mode: freq_only
    #   min_doc_freq_pct: 10.0

    # dc:format — physical description templates (script style, material, size).
    # format:
    #   mode: freq_only
    #   min_doc_freq_pct: 10.0

    # dc:rights — digitisation/copyright notices (near-universal boilerplate).
    # rights:
    #   mode: freq_only
    #   min_doc_freq_pct: 50.0

    # dc:source — shelfmark prefix ("Bibliothèque nationale de France. …").
    # source:
    #   mode: freq_only
    #   min_doc_freq_pct: 50.0

    # dc:type — record type labels ("Manuscrit", "Texte imprimé", …).
    # type:
    #   mode: freq_only
    #   min_doc_freq_pct: 50.0

# ---------------------------------------------------------------------------
# Parsing
# ---------------------------------------------------------------------------

parsing:
  # If a parsed JSON store already exists, skip re-parsing.
  # Set to true to force overwrite.
  overwrite_existing: false

# ---------------------------------------------------------------------------
# Matching
# ---------------------------------------------------------------------------

matching:
  surface_form:
    # Minimum fuzzy match ratio (0–1) for surface-form candidate acceptance
    fuzzy_threshold: 0.8
  embedding:
    # Sentence-transformers model for embedding-based matching
    model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
    batch_size: 32

# ---------------------------------------------------------------------------
# Clustering
# ---------------------------------------------------------------------------

clustering:
  algorithm: hdbscan
  min_cluster_size: 2
